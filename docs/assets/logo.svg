<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Main AI brain/network symbol -->
  <g transform="translate(100, 100)">
    <!-- Central node -->
    <circle cx="0" cy="0" r="18" fill="url(#gradient1)"/>
    
    <!-- Outer ring of nodes -->
    <circle cx="0" cy="-50" r="12" fill="url(#gradient2)"/>
    <circle cx="43" cy="-25" r="12" fill="url(#gradient2)"/>
    <circle cx="43" cy="25" r="12" fill="url(#gradient2)"/>
    <circle cx="0" cy="50" r="12" fill="url(#gradient2)"/>
    <circle cx="-43" cy="25" r="12" fill="url(#gradient2)"/>
    <circle cx="-43" cy="-25" r="12" fill="url(#gradient2)"/>
    
    <!-- Connecting lines -->
    <line x1="0" y1="0" x2="0" y2="-38" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="-20" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="20" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="38" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-35" y2="20" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-35" y2="-20" stroke="url(#gradient1)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Outer connections -->
    <line x1="0" y1="-50" x2="33" y2="-25" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="43" y1="-25" x2="43" y2="25" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="43" y1="25" x2="0" y2="50" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="50" x2="-43" y2="25" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-43" y1="25" x2="-43" y2="-25" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-43" y1="-25" x2="0" y2="-50" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Search magnifying glass accent -->
  <g transform="translate(135, 65)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <line x1="11" y1="11" x2="22" y2="22" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Sparkle accents -->
  <g fill="#f59e0b">
    <circle cx="160" cy="140" r="3"/>
    <circle cx="40" cy="55" r="2"/>
    <circle cx="55" cy="150" r="2.5"/>
  </g>
</svg>